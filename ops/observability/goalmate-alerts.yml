groups:
  - name: goalmate-critical
    rules:
      - alert: GoalMateApiHighErrorRate
        expr: sum(rate(goalmate_http_responses_total{status_class="5xx"}[5m])) / clamp_min(sum(rate(goalmate_http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "GoalMate API 5xx rate is above 5%" }
      - alert: GoalMateApiP95Slow
        expr: histogram_quantile(0.95, sum by (le) (rate(goalmate_http_request_duration_ms_bucket[5m]))) > 1000
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "GoalMate API P95 latency is above 1 second" }
      - alert: GoalMateRedisUnavailable
        expr: goalmate_queue_enabled == 1 and goalmate_redis_up == 0
        for: 2m
        labels: { severity: critical }
        annotations: { summary: "GoalMate Redis is unavailable while queueing is enabled" }
      - alert: GoalMateQueueBacklog
        expr: sum by (queue) (goalmate_queue_jobs{state=~"waiting|delayed"}) > 100
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "GoalMate queue backlog exceeds 100 jobs" }
      - alert: GoalMateProviderFailures
        expr: sum(goalmate_ai_provider_calls_total{status="FAILED"}) / clamp_min(sum(goalmate_ai_provider_calls_total), 1) > 0.2
        for: 10m
        labels: { severity: critical }
        annotations: { summary: "AI provider cumulative failure ratio exceeds 20%" }
      - alert: GoalMatePaymentEventsStuck
        expr: goalmate_payment_events_unprocessed > 0
        for: 10m
        labels: { severity: critical }
        annotations: { summary: "Payment events remain unprocessed" }
      - alert: GoalMateMysqlRollbacks
        expr: increase(goalmate_mysql_status{variable="com_rollback"}[10m]) > 20
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "MySQL rollback volume is elevated" }
      - alert: GoalMateBackupStale
        expr: time() - goalmate_backup_last_success_timestamp_seconds > 93600
        for: 15m
        labels: { severity: critical }
        annotations: { summary: "No successful GoalMate backup has been observed for 26 hours" }

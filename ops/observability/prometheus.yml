global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/goalmate-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: goalmate-api
    metrics_path: /metrics
    authorization:
      credentials_file: /run/secrets/goalmate_metrics_token
    static_configs:
      - targets: ["api:3000"]
